name: Scrape SIS PESRP

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:        # manual trigger

# Prevent overlapping runs: if a run is ever still going when the next
# trigger fires, cancel the stale one instead of letting them collide
# on data/*.json writes.
concurrency:
  group: scrape-sis-pesrp
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python fetch.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m \
            "scrape: $(date -u +'%Y-%m-%d %H:%M UTC')"

          # The scrape takes 20-30 minutes, so main may have moved on (a manual
          # commit, a deleted file, etc.) since this job's checkout. Rebase our
          # data/ commit onto the latest remote history before pushing, and
          # retry a few times in case of another late push.
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git rebase origin/main && git push origin main && break
            echo "Push attempt $i failed or rebase conflicted, retrying..."
            sleep 10
          done
